services:
  bob:
    image: drift:latest
    container_name: drift-lossy-bob
    cap_add:
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        tc qdisc add dev eth0 root netem delay 80ms 20ms loss 5% duplicate 1% reorder 3% 25%
        echo "[bob] tc netem applied 80ms+-20ms 5pct loss 1pct dup 3pct reorder"
        exec drift-recv
    networks:
      testnet:
        ipv4_address: 10.20.0.6

  alice:
    image: drift:latest
    container_name: drift-lossy-alice
    cap_add:
      - NET_ADMIN
    depends_on:
      - bob
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        tc qdisc add dev eth0 root netem delay 80ms 20ms loss 5%
        echo "[alice] tc netem applied 80ms+-20ms 5pct loss"
        sleep 3
        exec drift-send 10.20.0.6:9000
    networks:
      testnet:
        ipv4_address: 10.20.0.5

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24
