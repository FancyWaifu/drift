# 20-node DRIFT ring — pushes the topology larger than the first test.
# Each token makes 20 hops back to origin.

services:
  node0:
    image: drift:latest
    container_name: drift-r20-0
    command:
      - drift-ring
      - --index
      - "0"
      - --total
      - "20"
      - --listen
      - 0.0.0.0:9000
      - --next-addr
      - 10.81.0.11:9000
      - --tokens
      - "25"
      - --interval-ms
      - "100"
    networks:
      testnet:
        ipv4_address: 10.81.0.10
