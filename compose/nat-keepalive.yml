# Keepalive test: aggressively shrink conntrack UDP timeout on nat-a,
# verify that DRIFT's BEACON traffic (every 2s) keeps the flow alive.
#
# Default Linux conntrack UDP timeout is 30s (unreplied) / 180s (stream).
# We shrink it to 10s. If DRIFT's beacons don't keep the flow refreshed,
# the conntrack entry will expire between drift-send ticks and no
# subsequent packets will get NAT'd back to alice.

services:
  alice:
    image: drift:latest
    container_name: drift-nk-alice
    cap_add: [NET_ADMIN]
    depends_on: [nat-a]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        ip route replace default via 10.1.0.254
        sleep 3
        exec drift-send 203.0.113.50:9000
    networks:
      private-a:
        ipv4_address: 10.1.0.5

  nat-a:
    image: drift:latest
    container_name: drift-nk-router
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: 1
      net.netfilter.nf_conntrack_udp_timeout: 10
      net.netfilter.nf_conntrack_udp_timeout_stream: 15
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -P FORWARD DROP
        iptables -A FORWARD -s 10.1.0.0/24 -d 203.0.113.0/24 -j ACCEPT
        iptables -A FORWARD -s 203.0.113.0/24 -d 10.1.0.0/24 -m state --state RELATED,ESTABLISHED -j ACCEPT
        iptables -t nat -A POSTROUTING -s 10.1.0.0/24 -o eth1 -j MASQUERADE
        # Seal the router from real internet (INPUT/OUTPUT on its own packets).
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        echo "[nat-a] conntrack UDP timeout shrunk to 10s/15s, sealed"
        exec sleep infinity
    networks:
      private-a:
        ipv4_address: 10.1.0.254
      public-net:
        ipv4_address: 203.0.113.10

  server:
    image: drift:latest
    container_name: drift-nk-server
    cap_add: [NET_ADMIN]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        exec drift-recv
    networks:
      public-net:
        ipv4_address: 203.0.113.50

networks:
  private-a:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.0.0/24
          gateway: 10.1.0.1
  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
          gateway: 203.0.113.1
