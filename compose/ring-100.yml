    container_name: drift-r100-99
    command:
      - drift-ring
      - --index
      - "99"
      - --total
      - "100"
      - --listen
      - 0.0.0.0:9000
      - --next-addr
      - 10.100.0.10:9000
      - --tokens
      - "20"
      - --interval-ms
      - "100"
    networks:
      bignet:
        ipv4_address: 10.100.4.29

networks:
  bignet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/16
