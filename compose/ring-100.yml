# 100-node DRIFT ring on a /16 docker network.
#
# Nodes are placed across 5 different /24 blocks:
#   10.100.0.10-29, 10.100.1.10-29, ... 10.100.4.10-29
# so the topology provably cannot fit inside a single /24.
# Each token makes a full 100-hop round trip to prove the ring
# still converges across the larger address space.

services:
  node0:
    image: drift:latest
    container_name: drift-r100-0
    command:
      - drift-ring
      - --index
      - "0"
      - --total
      - "100"
      - --listen
      - 0.0.0.0:9000
      - --next-addr
      - 10.100.0.11:9000
      - --tokens
      - "20"
      - --interval-ms
      - "100"
    networks:
      bignet:
        ipv4_address: 10.100.0.10
  node1:
    image: drift:latest
    container_name: drift-r100-1
    command:
      - drift-ring
      - --index
