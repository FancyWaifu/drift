# Dual-NAT direct scenario: both peers behind NATs, alice tries to reach
# bob's public NAT address directly. Expected: FAILS, because bob's NAT
# has no existing conntrack entry for incoming packets from alice.
#
# This documents DRIFT's current lack of NAT traversal.

services:
  alice:
    image: drift:latest
    container_name: drift-nat2-alice
    cap_add: [NET_ADMIN]
    depends_on: [nat-a]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 10.2.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        ip route replace default via 10.1.0.254
        echo "[alice] locked to test subnets"
        sleep 3
        # Try to reach bob directly at his NAT's public IP (203.0.113.20).
        exec drift-send 203.0.113.20:9000
    networks:
      private-a:
        ipv4_address: 10.1.0.5

  nat-a:
    image: drift:latest
    container_name: drift-nat2-router-a
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: 1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -P FORWARD DROP
        iptables -A FORWARD -s 10.1.0.0/24 -d 203.0.113.0/24 -j ACCEPT
        iptables -A FORWARD -s 203.0.113.0/24 -d 10.1.0.0/24 -m state --state RELATED,ESTABLISHED -j ACCEPT
        iptables -t nat -A POSTROUTING -s 10.1.0.0/24 -o eth1 -j MASQUERADE
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        echo "[nat-a] ready"
        exec sleep infinity
    networks:
      private-a:
        ipv4_address: 10.1.0.254
      public-net:
        ipv4_address: 203.0.113.10

  nat-b:
    image: drift:latest
    container_name: drift-nat2-router-b
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: 1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -P FORWARD DROP
        iptables -A FORWARD -s 10.2.0.0/24 -d 203.0.113.0/24 -j ACCEPT
        iptables -A FORWARD -s 203.0.113.0/24 -d 10.2.0.0/24 -m state --state RELATED,ESTABLISHED -j ACCEPT
        iptables -t nat -A POSTROUTING -s 10.2.0.0/24 -o eth1 -j MASQUERADE
        iptables -A OUTPUT -d 10.2.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        echo "[nat-b] ready (drops unsolicited inbound)"
        exec sleep infinity
    networks:
      private-b:
        ipv4_address: 10.2.0.254
      public-net:
        ipv4_address: 203.0.113.20

  bob:
    image: drift:latest
    container_name: drift-nat2-bob
    cap_add: [NET_ADMIN]
    depends_on: [nat-b]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        iptables -A OUTPUT -d 10.2.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 10.1.0.0/24 -j ACCEPT
        iptables -A OUTPUT -d 203.0.113.0/24 -j ACCEPT
        iptables -A OUTPUT -j DROP
        ip route replace default via 10.2.0.254
        echo "[bob] locked to test subnets"
        exec drift-recv
    networks:
      private-b:
        ipv4_address: 10.2.0.5

networks:
  private-a:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.0.0/24
          gateway: 10.1.0.1
  private-b:
    driver: bridge
    ipam:
      config:
        - subnet: 10.2.0.0/24
          gateway: 10.2.0.1
  public-net:
    driver: bridge
    ipam:
      config:
        - subnet: 203.0.113.0/24
          gateway: 203.0.113.1
