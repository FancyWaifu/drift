# 15-node DRIFT ring. Each node N has a DRIFT session to its +1 neighbor
# (as Initiator) and accepts a session from its -1 neighbor (as Responder).
# Tokens injected by node 0 traverse the entire ring, then node 0 logs
# each completion.
#
# Topology: 10.80.0.10, 10.80.0.11, ..., 10.80.0.24  (15 nodes)
# Ring:  0 -> 1 -> 2 -> ... -> 14 -> 0

services:
  node0:
    image: drift:latest
    container_name: drift-ring-0
    command:
      - drift-ring
      - --index
      - "0"
      - --total
      - "15"
      - --listen
      - 0.0.0.0:9000
      - --next-addr
      - 10.80.0.11:9000
      - --tokens
      - "10"
      - --interval-ms
      - "200"
    networks:
      testnet:
        ipv4_address: 10.80.0.10
  node1:
    image: drift:latest
    container_name: drift-ring-1
