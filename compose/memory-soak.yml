services:
  bob:
    image: drift:latest
    container_name: drift-memsoak-bob
    command: drift-recv
    networks:
      testnet:
        ipv4_address: 10.64.0.6

  alice:
    image: drift:latest
    container_name: drift-memsoak-alice
    depends_on: [bob]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 2
        exec drift-send 10.64.0.6:9000
    networks:
      testnet:
        ipv4_address: 10.64.0.5

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.64.0.0/24
